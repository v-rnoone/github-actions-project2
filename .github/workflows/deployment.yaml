name: test_project
on: [push, workflow_dispatch]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: get code
              uses: actions/checkout@v6
            - name: install node JS
              uses: actions/setup-node@v6
              with:
                node_version: '20'
            - name: install dependencies
              run: npm ci
            - name: run test    
              run: npm test

    deploy:
        needs: test 
        runs-on: ubuntu-latest
        steps:
            - name: get code
              uses: actions/checkout@v6
            - name: install node JS
              uses: actions/setup-node@v6
              with:
                node_version: '20'
            - name: install dependencies
              run: npm ci
            - name: build project
              run: npm run build
            - name: deploy
              run: echo "deployed to server"
              

